<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Controle do Quiz</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
    .header { text-align: center; margin-bottom: 30px; }
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
    .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card h2 { margin-top: 0; border-bottom: 2px solid #0076ff; padding-bottom: 10px; color: #0076ff; }
    .form-group { margin-bottom: 15px; }
    input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .options-grid div { display: flex; align-items: center; gap: 8px; background: #f8f9fa; padding: 8px; border-radius: 4px; border: 1px solid #eee; }
    .btn { background-color: #0076ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-bottom: 10px;}
    .btn:hover { background-color: #005bb5; }
    .btn-start { background-color: #28a745; font-size: 20px; }
    .btn-action { background-color: #ffc107; color: #333; font-size: 14px; padding: 5px 15px; width: auto; margin: 0;}
    .btn-danger { background-color: #dc3545; color: white; padding: 5px 10px; font-size: 12px; margin-left: 10px; border: none; border-radius: 4px; cursor: pointer;}
    #pinDisplay { font-size: 48px; font-weight: bold; text-align: center; letter-spacing: 5px; margin: 10px 0; color: #333; }
    .player-list { list-style: none; padding: 0; }
    .player-item { display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 8px 15px; border-radius: 5px; margin-bottom: 5px; font-weight: bold; }
    #painelJogoAtivo { display: none; background: #fff3cd; border: 2px solid #ffeeba; }
    .timer-display { font-size: 30px; font-weight: bold; color: #dc3545; text-align: center; }
    .pergunta-card { background: #f8f9fa; padding: 10px; border-radius: 5px; border-left: 4px solid #0076ff; margin-bottom: 10px; }
    .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; text-transform: uppercase; color: white; margin-left: 5px; }
    .badge-unica { background: #17a2b8; }
    .badge-multi { background: #6f42c1; }
  </style>
</head>
<body>

  <div class="header"><h1>Controle do Quiz (Híbrido)</h1></div>

  <div class="dashboard">
    <div class="column">
      <div class="card">
        <h2>1. Sala do Jogo</h2>
        <button class="btn" onclick="gerarSala()">Gerar Novo Código da Sala</button>
        <div id="pinDisplay">------</div>
      </div>

      <div class="card" style="margin-top: 20px;">
        <h2>3. Sala de Espera</h2>
        <p>Jogadores: <span id="playerCount">0</span></p>
        <ul class="player-list" id="lobbyList"></ul>
        <button class="btn btn-start" id="btnIniciar" onclick="iniciarJogo()">Iniciar Jogo Agora!</button>
      </div>

      <div class="card" id="painelJogoAtivo" style="margin-top: 20px;">
        <h2>Controle da Partida</h2>
        <p>Pergunta: <span id="adminStatusPergunta">1</span></p>
        <div class="timer-display" id="adminTimer">00</div>
        <button class="btn" id="btnProxima" style="display:none;" onclick="proximaPergunta()">Próxima Pergunta</button>
        <button class="btn btn-start" id="btnPodio" style="display:none;" onclick="mostrarPodio()">Resultado Final</button>
        <button class="btn btn-danger" id="btnEncerrar" style="display:none; width: 100%;" onclick="encerrarSala()">Encerrar e Limpar Sala</button>
      </div>
    </div>

    <div class="column">
      <div class="card">
        <h2>2. Criar Pergunta</h2>
        <div class="form-group">
          <label>Tipo de Resposta:</label>
          <select id="tipoPergunta" onchange="alternarInputsResposta()">
            <option value="unica">Única Escolha (Radio)</option>
            <option value="multipla">Múltipla Escolha (Checkbox)</option>
          </select>
        </div>
        <div class="form-group"><input type="text" id="perguntaTexto" placeholder="Digite a pergunta aqui..."></div>
        
        <div class="options-grid form-group" id="containerOpcoes">
          </div>

        <div class="form-group"><label>Tempo (s):</label><input type="number" id="tempoPergunta" value="20"></div>
        <button class="btn" id="btnFormPergunta" onclick="salvarOuAtualizarPergunta()">Adicionar Pergunta</button>
        <button class="btn btn-danger" id="btnCancelarEdicao" style="display:none; width: 100%; margin-left: 0;" onclick="cancelarEdicao()">Cancelar</button>
        
        <div style="margin-top: 20px;">
          <h3>Lista Atual:</h3>
          <div id="listaPerguntas"></div>
          <button class="btn btn-danger" style="width: 100%; margin-top: 10px;" onclick="limparListaAtual()">Limpar Lista</button>
        </div>
      </div>

      <div class="card" style="margin-top: 20px;">
        <h2>4. Banco de Quizzes</h2>
        <div style="display: flex; gap: 5px;">
          <input type="text" id="nomeNovoQuiz" placeholder="Nome do Quiz">
          <button class="btn btn-start" style="width: auto;" onclick="salvarQuizNoBanco()">Salvar</button>
        </div>
        <ul class="player-list" id="listaQuizzesBanco" style="margin-top: 10px;"></ul>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove, get, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA2dxpfl9XwTjtX-DK4GBNihLMrQ8MVaDQ", 
      authDomain: "meuquizapp-60807.firebaseapp.com",
      databaseURL: "https://meuquizapp-60807-default-rtdb.firebaseio.com", 
      projectId: "meuquizapp-60807",
      storageBucket: "meuquizapp-60807.firebasestorage.app", 
      messagingSenderId: "1036916991385", 
      appId: "1:1036916991385:web:d1823e90a3c4fccb829f08"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let codigoSala = "";
    let perguntas = [];
    let editandoIndex = -1;
    let perguntaAtualIndex = 0;
    let timerInterval;

    window.alternarInputsResposta = function() {
      const tipo = document.getElementById('tipoPergunta').value;
      const container = document.getElementById('containerOpcoes');
      const inputType = tipo === 'unica' ? 'radio' : 'checkbox';
      
      container.innerHTML = '';
      for(let i=0; i<4; i++) {
        container.innerHTML += `
          <div>
            <input type="${inputType}" name="correta" value="${i}">
            <input type="text" id="opt${i}" placeholder="Opção ${String.fromCharCode(65+i)}">
          </div>
        `;
      }
    };

    window.salvarOuAtualizarPergunta = function() {
      const tipo = document.getElementById('tipoPergunta').value;
      const texto = document.getElementById('perguntaTexto').value;
      const opts = [
        document.getElementById('opt0').value, document.getElementById('opt1').value,
        document.getElementById('opt2').value, document.getElementById('opt3').value
      ];
      const tempo = parseInt(document.getElementById('tempoPergunta').value);
      const marcados = Array.from(document.querySelectorAll('input[name="correta"]:checked')).map(cb => parseInt(cb.value));

      if(!texto || opts.some(o => !o)) { alert("Preencha tudo!"); return; }
      if(marcados.length === 0) { alert("Marque a(s) correta(s)!"); return; }

      const novaP = { 
        pergunta: texto, opcoes: opts, 
        respostasCorretas: marcados, 
        tipo: tipo, tempo: tempo 
      };

      if(editandoIndex >= 0) perguntas[editandoIndex] = novaP;
      else perguntas.push(novaP);

      cancelarEdicao();
      atualizarInterfaceDaLista();
      if(codigoSala) update(ref(db, `salas/${codigoSala}`), { perguntas });
    };

    window.editarPerguntaDaLista = function(index) {
      editandoIndex = index;
      const p = perguntas[index];
      document.getElementById('tipoPergunta').value = p.tipo;
      alternarInputsResposta();
      
      document.getElementById('perguntaTexto').value = p.pergunta;
      p.opcoes.forEach((opt, i) => document.getElementById(`opt${i}`).value = opt);
      document.getElementById('tempoPergunta').value = p.tempo;
      
      p.respostasCorretas.forEach(val => {
        const input = document.querySelector(`input[name="correta"][value="${val}"]`);
        if(input) input.checked = true;
      });

      document.getElementById('btnFormPergunta').innerText = "Atualizar";
      document.getElementById('btnCancelarEdicao').style.display = "block";
    };

    window.cancelarEdicao = function() {
      editandoIndex = -1;
      document.getElementById('perguntaTexto').value = "";
      document.getElementById('tempoPergunta').value = "20";
      alternarInputsResposta();
      document.getElementById('btnFormPergunta').innerText = "Adicionar Pergunta";
      document.getElementById('btnCancelarEdicao').style.display = "none";
    };

    function atualizarInterfaceDaLista() {
      const div = document.getElementById('listaPerguntas');
      div.innerHTML = perguntas.length ? "" : "Vazio.";
      perguntas.forEach((p, i) => {
        div.innerHTML += `
          <div class="pergunta-card">
            <strong>${i+1}. ${p.pergunta}</strong> 
            <span class="badge ${p.tipo === 'unica' ? 'badge-unica' : 'badge-multi'}">${p.tipo}</span>
            <br>
            <button class="btn-action" onclick="editarPerguntaDaLista(${i})">Editar</button>
            <button class="btn-danger" onclick="excluirP(${i})">X</button>
          </div>
        `;
      });
    }

    window.excluirP = function(i) { 
      perguntas.splice(i, 1); 
      atualizarInterfaceDaLista(); 
    };
    
    window.limparListaAtual = function() { 
      perguntas = []; 
      atualizarInterfaceDaLista(); 
    };

    // ==========================================
    // LÓGICA DO BANCO DE QUIZZES (PERSISTÊNCIA)
    // ==========================================

    // Salva o array de perguntas atual como um novo documento na coleção "quizzes"
    window.salvarQuizNoBanco = function() {
      const nome = document.getElementById('nomeNovoQuiz').value;
      if(!nome || !perguntas.length) return alert("Dê um nome e adicione perguntas à lista atual primeiro!");
      
      const novoQuizRef = push(ref(db, 'quizzes')); // Gera um ID único no Firebase
      set(novoQuizRef, { 
        nome: nome, 
        perguntas: perguntas 
      }).then(() => {
        alert("Quiz salvo com sucesso no banco de dados!");
        document.getElementById('nomeNovoQuiz').value = "";
      }).catch((error) => {
        console.error("Erro ao salvar:", error);
        alert("Erro ao salvar o quiz.");
      });
    };

    // Escuta em tempo real as mudanças no nó "quizzes" para popular a interface
    function carregarQuizzesBanco() {
      onValue(ref(db, 'quizzes'), (snap) => {
        const lista = document.getElementById('listaQuizzesBanco');
        lista.innerHTML = ""; // Limpa a lista antes de repopular
        const dados = snap.val();
        
        if(dados) {
          Object.entries(dados).forEach(([id, quiz]) => {
            const li = document.createElement('li');
            li.className = "player-item";
            li.innerHTML = `
              ${quiz.nome} 
              <button class="btn-action" onclick="usarQuiz('${id}')">Carregar</button>
            `;
            lista.appendChild(li);
          });
        } else {
          lista.innerHTML = "<p style='text-align:center; color:#888;'>Nenhum quiz salvo.</p>";
        }
      });
    }

    // Busca um quiz específico pelo ID e substitui a lista atual
    window.usarQuiz = async function(id) {
      const snap = await get(ref(db, `quizzes/${id}`));
      if(snap.exists()) {
        perguntas = snap.val().perguntas || [];
        atualizarInterfaceDaLista();
        alert("Quiz carregado para a lista atual!");
      }
    };

    // ==========================================
    // LÓGICA DE SALA E PARTIDA
    // ==========================================

    window.gerarSala = function() {
      codigoSala = Math.floor(100000 + Math.random() * 900000).toString();
      document.getElementById('pinDisplay').innerText = codigoSala;
      
      set(ref(db, `salas/${codigoSala}`), { 
        status: 'aguardando', 
        perguntas, 
        pergunta_atual: 0 
      });
      
      onValue(ref(db, `salas/${codigoSala}/jogadores`), snap => {
        const d = snap.val() || {};
        document.getElementById('playerCount').innerText = Object.keys(d).length;
        document.getElementById('lobbyList').innerHTML = Object.keys(d).map(n => `<li class="player-item">${n}</li>`).join('');
      });
      
      window.open(`display.html?pin=${codigoSala}`, '_blank');
    };

    window.iniciarJogo = function() {
      if(!perguntas.length) return alert("Sem perguntas!");
      document.getElementById('painelJogoAtivo').style.display = 'block';
      dispararPergunta(0);
    };

    function dispararPergunta(idx) {
      perguntaAtualIndex = idx;
      const p = perguntas[idx];
      const inicio = Date.now();
      const fim = inicio + (p.tempo * 1000);
      
      document.getElementById('adminStatusPergunta').innerText = (idx + 1) + " / " + perguntas.length;

      set(ref(db, `salas/${codigoSala}/respostas`), null).then(() => {
        update(ref(db, `salas/${codigoSala}`), { 
          status: 'pergunta', 
          pergunta_atual: idx, 
          timestamp_inicio: inicio, 
          timestamp_fim: fim 
        });
      });

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        let res = Math.ceil((fim - Date.now()) / 1000);
        document.getElementById('adminTimer').innerText = res > 0 ? res + "s" : "Fim!";
        if(res <= 0) { 
          clearInterval(timerInterval); 
          processarResultados(); 
        }
      }, 1000);
    }

    async function processarResultados() {
      const snap = await get(ref(db, `salas/${codigoSala}`));
      const dados = snap.val();
      const p = dados.perguntas[perguntaAtualIndex];
      let pts = dados.pontuacoes || {};
      const resps = dados.respostas || {};

      for(const [player, r] of Object.entries(resps)) {
        // Valida se as respostas enviadas pelo array batem exatamente com as corretas
        const acertou = r.alternativas.length === p.respostasCorretas.length && 
                        r.alternativas.every(v => p.respostasCorretas.includes(v));
        if(acertou) {
          const tempo = r.timestamp - dados.timestamp_inicio;
          const ganho = Math.round((1 - (tempo / (p.tempo * 1000))) * 1000);
          pts[player] = (pts[player] || 0) + (ganho > 0 ? ganho : 0);
        }
      }
      update(ref(db, `salas/${codigoSala}`), { status: 'ranking', pontuacoes: pts });
      document.getElementById(perguntaAtualIndex + 1 < perguntas.length ? 'btnProxima' : 'btnPodio').style.display = 'block';
    }

    window.proximaPergunta = function() { 
      document.getElementById('btnProxima').style.display = 'none';
      dispararPergunta(perguntaAtualIndex + 1); 
    };

    window.mostrarPodio = function() { 
      update(ref(db, `salas/${codigoSala}`), { status: 'podio' }); 
      document.getElementById('btnEncerrar').style.display = 'block';
      document.getElementById('btnPodio').style.display = 'none';
    };

    window.encerrarSala = function() { 
      remove(ref(db, `salas/${codigoSala}`)).then(() => location.reload()); 
    };

    // Inicialização
    alternarInputsResposta();
    carregarQuizzesBanco(); // Carrega a lista do Firebase ao iniciar a página
  </script>
</body>
</html>
