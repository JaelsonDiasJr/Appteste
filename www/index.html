<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  
  <link rel="stylesheet" href="https://unpkg.com/onsenui/css/onsenui.css">
  <link rel="stylesheet" href="https://unpkg.com/onsenui/css/onsen-css-components.min.css">
  <script src="https://unpkg.com/onsenui/js/onsenui.min.js"></script>

  <link rel="stylesheet" href="css/style.css">

</head>
<body>

  <ons-navigator swipeable id="myNavigator" page="join.html"></ons-navigator>

  <template id="join.html">
    <ons-page id="tela-inicial">
      <div class="background-amarelo">
        
        <div class="area-logo">
          <div class="card-quiz">
            <h1>KomHoot</h1>
          </div>
        </div>

        <div class="area-acao">
          <input type="text" id="roomCode" placeholder="Código da Sala" autocomplete="off" />
          <ons-button id="btn-entrar" modifier="large" onclick="avancarParaNome()">ENTRAR</ons-button>
        </div>

      </div>
    </ons-page>
  </template>

  <template id="name.html">
    <ons-page>
      <div class="background-amarelo tela-centralizada">
        <div class="container card-padrao">
          <div class="title" style="margin-bottom: 20px;">Como devemos te chamar?</div>
          
          <input type="text" id="playerName" class="input-padrao" placeholder="Seu Apelido" autocomplete="off" />
          <br><br>
          
          <button class="btn-padrao" onclick="entrarNoLobby()">PRONTO!</button>
        </div>
      </div>
    </ons-page>
  </template>

  <template id="status.html">
    <ons-page id="statusPage">
      <div class="background-amarelo tela-centralizada">
        <div class="container">
          <div class="caixa-texto title" id="msgStatus">Aguardando...</div>
          <p class="caixa-texto" id="subMsgStatus">Olhe para o telão.</p>
          <div id="zonaPontos" style="display:none;">
            <div class="pontos-finais caixa-texto" id="meusPontos">0 pts</div>
          </div>
        </div>
      </div>
    </ons-page>
  </template>

  <template id="game.html">
    <ons-page id="gamePage">
      <div class="background-amarelo tela-centralizada">
        <div class="container" style="width: 100%;">
          <div class="grid-opcoes" id="botoesJogo">
            <button class="btn-opcao btn-a" onclick="enviarResposta(0)">A</button>
            <button class="btn-opcao btn-b" onclick="enviarResposta(1)">B</button>
            <button class="btn-opcao btn-c" onclick="enviarResposta(2)">C</button>
            <button class="btn-opcao btn-d" onclick="enviarResposta(3)">D</button>
          </div>
        </div>
      </div>
    </ons-page>
  </template>

  <script type="module" src="js/app.js"></script> 
</body>
</html>
