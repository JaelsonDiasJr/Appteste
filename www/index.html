<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  
  <link rel="stylesheet" href="https://unpkg.com/onsenui/css/onsenui.css">
  <link rel="stylesheet" href="https://unpkg.com/onsenui/css/onsen-css-components.min.css">
  <script src="https://unpkg.com/onsenui/js/onsenui.min.js"></script>

  <link rel="stylesheet" href="css/style.css">

</head>
<body>

  <ons-navigator swipeable id="myNavigator" page="join.html"></ons-navigator>

  <template id="join.html">
    <ons-page>
      <ons-toolbar><div class="center">Entrar no Quiz</div></ons-toolbar>
      <div class="container">
        <div class="title">Bem-vindo!</div>
        <ons-input id="roomCode" modifier="underbar" placeholder="PIN da Sala" float type="number"></ons-input><br><br>
        <ons-button modifier="large" onclick="avancarParaNome()">Entrar na Sala</ons-button>
        <br><br>
        
        <ons-button modifier="large--outline" onclick="abrirCamera()">
          <ons-icon icon="md-camera"></ons-icon> Ler QR Code
        </ons-button>
        
      </div>
    </ons-page>
  </template>

  <template id="name.html">
    <ons-page><ons-toolbar><div class="center">Seu Perfil</div></ons-toolbar>
      <div class="container"><div class="title">Como devemos te chamar?</div>
        <ons-input id="playerName" modifier="underbar" placeholder="Seu Apelido" float></ons-input><br><br>
        <ons-button modifier="large" onclick="entrarNoLobby()">Pronto!</ons-button>
      </div></ons-page>
  </template>

  <template id="status.html">
    <ons-page id="statusPage"><ons-toolbar><div class="center">Status</div></ons-toolbar>
      <div class="container">
        <div class="title" id="msgStatus">Aguardando...</div>
        <p id="subMsgStatus">Olhe para o telão.</p>
        <div id="zonaPontos" style="display:none;"><div class="pontos-finais" id="meusPontos">0 pts</div></div>
      </div>
    </ons-page>
  </template>

  <template id="game.html">
    <ons-page id="gamePage"><ons-toolbar><div class="center">Responda!</div></ons-toolbar>
      <div class="container">
        <div class="grid-opcoes" id="botoesJogo">
          <button class="btn-opcao btn-a" onclick="enviarResposta(0)">A</button>
          <button class="btn-opcao btn-b" onclick="enviarResposta(1)">B</button>
          <button class="btn-opcao btn-c" onclick="enviarResposta(2)">C</button>
          <button class="btn-opcao btn-d" onclick="enviarResposta(3)">D</button>
        </div>
      </div>
    </ons-page>
  </template>

  <button id="btn-fechar-camera" onclick="fecharCamera()">Cancelar Leitura</button>
  <script type="module" src="js/app.js "></script> 
</body>
</html>
